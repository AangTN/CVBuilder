services:
  db:
    image: postgres:16-alpine
    container_name: cv-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-cvonline}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cvonline}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-bookworm-slim
    container_name: cv-backend-dev
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./cv-backend/.env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123}@db:5432/${POSTGRES_DB:-cvonline}
      FRONTEND_URL: http://localhost:3000
      FRONTEND_EXPORT_URL: http://frontend:3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./cv-backend:/app
      - backend_node_modules:/app/node_modules
      - ./cv-backend/uploads:/app/uploads
    command: sh -c "apt-get update -y && apt-get install -y --no-install-recommends openssl && rm -rf /var/lib/apt/lists/* && npm ci && npx prisma generate && npm run start:dev"

  frontend:
    image: node:22-bookworm-slim
    container_name: cv-frontend-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT}
      NEXT_PUBLIC_GOOGLE_CLIENT: ${GOOGLE_CLIENT}
      EXPORT_RENDER_KEY: ${EXPORT_RENDER_KEY}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./cv-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  postgres_data_dev:
  backend_node_modules:
  frontend_node_modules:
